name: Auto Convert Rules

on:
  schedule:
    # UTC 20:00 (Japan 05:00)
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download latest Mihomo Alpha
        run: |
          echo "Downloading latest Mihomo Alpha..."
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/tags/Prerelease-Alpha | jq -r '.assets[].browser_download_url' | grep -E 'linux-amd64-alpha-[a-z0-9]+\.gz' | head -n 1)
          wget -qO mihomo.gz "$DOWNLOAD_URL"
          gunzip mihomo.gz
          chmod +x mihomo

      - name: Download and Convert Domain Rules (Reject)
        run: |
          echo "Starting download raw file..."
          wget -qO reject.txt https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/reject.txt
          
          echo "Starting convert..."
          ./mihomo convert-ruleset domain yaml reject.txt reject.tmp.mrs
          mv reject.tmp.mrs reject.mrs
          echo "Finished convert reject.mrs"

      - name: Download and Convert IP Rules (FireHOL Level 1)
        run: |
          echo "Starting download firehol_level1.netset..."
          wget -qO firehol_level1.netset https://iplists.firehol.org/files/firehol_level1.netset
          
          echo "Parsing to YAML format..."
          # 1. 写入开头 payload:
          echo "payload:" > firehol_level1.yaml
          # 2. 过滤掉 # 开头的注释和空行
          # 3. 使用 awk 在每行 IP 前加上 "  - '" 并以 "'" 结尾，拼装成标准 yaml 数组格式
          grep -vE "^#|^$" firehol_level1.netset | awk '{print "  - \047" $1 "\047"}' >> firehol_level1.yaml
          
          echo "Starting convert to MRS..."
          # 注意：这里的类型是 ipcidr，格式是 yaml
          ./mihomo convert-ruleset ipcidr yaml firehol_level1.yaml firehol_level1.tmp.mrs
          mv firehol_level1.tmp.mrs firehol_level1.mrs
          echo "Finished convert firehol_level1.mrs"

      - name: Force Push to Release Branch
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git checkout --orphan release
          # 确保同时提交新生成的 mrs 文件
          git add reject.mrs firehol_level1.mrs
          git commit -m "Auto Update: $(date +'%Y-%m-%d %H:%M:%S')"
          
          git push -f origin release
